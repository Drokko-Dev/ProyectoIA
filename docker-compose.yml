services:
  backend-api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./storage:/data_storage
    # Esto evita que se borren archivos si el contenedor se detiene
    env_file:
      - ./backend/.env

  frontend-app:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    depends_on:
      - backend-api

  xtts-service:
    build: ./xtts_service
    ports:
      - "8001:8001"
    volumes:
      # Conectamos una carpeta física para que puedas soltar tus audios de referencia
      - ./xtts_service/assets:/app/assets
    environment:
      # Nuestro interruptor manual. Ponlo en True si algún día quieres forzar la CPU.
      - FORZAR_CPU=False
      - COQUI_TOS_AGREED=1 #Le decimos que sí a los términos automáticamente
