services:
  backend-api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    # Esto evita que se borren archivos si el contenedor se detiene
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}

  frontend-app:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # El siguiente volumen es un truco para no romper node_modules en Windows/Mac
      - /app/node_modules
    depends_on:
      - backend-api
